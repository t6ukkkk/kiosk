<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root { color-scheme: dark; }
    html,body{
      margin:0;padding:0;

<div id="screen-weather" style="display:none;">
  <header>
    <div class="row">
      <span class="pill">Ilm → Tallinn</span>
      <span class="big">Ilm</span>
      <span id="w_updated" class="muted"></span>
      <span class="pill muted">Auto-refresh: 30m</span>

    <div class="grid">
      <div class="card"><div class="k">Hetkel</div><div class="v"><span id="w_now" class="mono">—</span> <span class="tag">°C</span></div></div>
      <div class="card"><div class="k">Tuul (hetkel)</div><div class="v"><span id="w_wind" class="mono">—</span> <span class="tag">m/s</span></div></div>

    <div id="w_error" class="err"></div>

    <div class="chartWrap" style="height:70vh;">

      <canvas id="weatherForecaChart"></canvas>
    </div>
  </main>
</div>

<script>
/* ===================== ELECTRICITY ===================== */
const SRC = "https://cold-shape-2620.mihkel-pranstibel.workers.dev/";

let chart;
let currentBarIndex = -1;

let latest = { labels: [], data: [], tsList: [] };

// fetch JSON every 30 minutes (matches your pill now)
const REFRESH_MS = 30 * 60 * 1000;
const HIGHLIGHT_MS = 15 * 1000;

document.getElementById("refresh_s").textContent = String(Math.round(REFRESH_MS / 1000));

function fmt2(n){ return (Number.isFinite(n) ? n.toFixed(2) : "—"); }

function sameLocalHour(tsSeconds, nowDate){
  const d = new Date(tsSeconds * 1000);
  return (
    d.getFullYear() === nowDate.getFullYear() &&
    d.getMonth() === nowDate.getMonth() &&
    d.getDate() === nowDate.getDate() &&
    d.getHours() === nowDate.getHours()
  );
}

function colorForValue(v){
  if (!Number.isFinite(v)) return "rgba(120,120,120,0.6)";
  if (v > 18) return "rgba(255, 90, 90, 0.85)";
  if (v < 11) return "rgba(120, 255, 160, 0.85)";
  return "rgba(255, 180, 80, 0.85)";
}

function toHourlyAverages(timeline){
  const map = new Map();
  for (const t of timeline){
    const ts = Number(t.startTimestamp ?? t.timestamp);
    const price = Number(t.price ?? t.value);
    if (!Number.isFinite(ts) || !Number.isFinite(price)) continue;

    const d = new Date(ts * 1000);
    const key =
      d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0") + " " +
      String(d.getHours()).padStart(2,"0");

    const cur = map.get(key) ?? { sum: 0, count: 0, ts: ts };
    cur.sum += price;
    cur.count += 1;
    if (ts < cur.ts) cur.ts = ts;
    map.set(key, cur);
  }

  const rows = [...map.entries()]
    .map(([key, v]) => ({ ts: v.ts, avg: v.sum / v.count }))
    .sort((a,b) => a.ts - b.ts);

  const labels = rows.map(r => {
    const d = new Date(r.ts * 1000);
    return String(d.getHours()).padStart(2,"0") + ":00";
  });

  return { labels, data: rows.map(r => r.avg), tsList: rows.map(r => r.ts) };
}

const glowCurrentBarPlugin = {
  id: 'glowCurrentBar',
  beforeDatasetsDraw(chart) {
    const idx = currentBarIndex;
    if (idx < 0) return;

    const meta = chart.getDatasetMeta(0);
    const el = meta?.data?.[idx];
    if (!el) return;

    const ctx = chart.ctx;
    const area = chart.chartArea;
    if (!area) return;

    const props = el.getProps(['x','width'], true);
    const x = props.x;
    const w = props.width;

    const padX = Math.max(8, w * 0.35);
    const left = x - (w / 2) - padX;
    const width = w + padX * 2;

    ctx.save();
    ctx.shadowColor = 'rgba(255,255,255,0.65)';
    ctx.shadowBlur = 22;
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.fillRect(left, area.top, width, area.bottom - area.top);

    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect(left + 1, area.top + 1, width - 2, (area.bottom - area.top) - 2);
    ctx.restore();
  }
};

function recomputeCurrentIndexAndRestyle(){
  if (!chart || !latest.tsList.length) return;

  const now = new Date();
  const newIdx = latest.tsList.findIndex(ts => sameLocalHour(ts, now));
  if (newIdx === currentBarIndex) return;

  currentBarIndex = newIdx;

  const ds = chart.data.datasets[0];
  ds.backgroundColor = latest.data.map((v, i) => {
    const c = colorForValue(v);
    if (i === currentBarIndex) return c.replace(/0\.85\)$/, "0.98)");
    return c;
  });
  ds.borderWidth = (ctx) => (ctx.dataIndex === currentBarIndex ? 2 : 0);
  ds.borderColor = (ctx) => (ctx.dataIndex === currentBarIndex ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0)");

  chart.update("none");
}

function drawChart(labels, data) {
  const ctx = document.getElementById("priceChart");
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map((v, i) => {
          const c = colorForValue(v);
          if (i === currentBarIndex) return c.replace(/0\.85\)$/, "0.98)");
          return c;
        }),
        borderWidth: (ctx) => (ctx.dataIndex === currentBarIndex ? 2 : 0),
        borderColor: (ctx) => (ctx.dataIndex === currentBarIndex ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0)")
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { autoSkip: true, maxTicksLimit: 24, minRotation: 90, maxRotation: 90 },
          grid: { display: true, color: 'rgba(255,255,255,0.1)', lineWidth: 1 }
        },
        y: {
          beginAtZero: true,
          ticks: { stepSize: 5 },
          grid: { display: true, color: 'rgba(255,255,255,0.2)', lineWidth: 1 },
          title: { display: true, text: "senti/kWh" }
        }
      }
    },
    plugins: [glowCurrentBarPlugin]
  });
}

async function loadData() {
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";

  const url = SRC + (SRC.includes("?") ? "&" : "?") + "t=" + Date.now();
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();

  if (j.chartTitle) document.getElementById("title").textContent = j.chartTitle;

  const now = new Date();
  document.getElementById("updated").textContent =
    `• uuendatud (fetch) ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  const timeline = Array.isArray(j.timeline) ? j.timeline : [];
  const { labels, data, tsList } = toHourlyAverages(timeline);
  if (!labels.length || !data.length) throw new Error("Graafiku andmeid ei leitud (timeline tühi või väljad ei klapi).");

  latest = { labels, data, tsList };

  const nowDate = new Date();
  currentBarIndex = tsList.findIndex(ts => sameLocalHour(ts, nowDate));

  const todayY = nowDate.getFullYear();
  const todayM = nowDate.getMonth();
  const todayD = nowDate.getDate();

  const todayIdx = [];
  for (let i = 0; i < tsList.length; i++) {
    const d = new Date(tsList[i] * 1000);
    if (d.getFullYear() === todayY && d.getMonth() === todayM && d.getDate() === todayD) todayIdx.push(i);
  }
  const idxToUse = todayIdx.length ? todayIdx : tsList.map((_, i) => i);
  const valsToday = idxToUse.map(i => data[i]).filter(Number.isFinite);

  const minV = Math.min(...valsToday);
  const maxV = Math.max(...valsToday);
  const avgV = valsToday.reduce((a,b)=>a+b,0) / (valsToday.length || 1);

  let curIdx = currentBarIndex;
  if (curIdx < 0) curIdx = idxToUse[idxToUse.length - 1];
  const curV = Number.isFinite(data[curIdx]) ? data[curIdx] : NaN;

  document.getElementById("current").textContent = fmt2(curV);
  document.getElementById("avg").textContent = fmt2(avgV);
  document.getElementById("min").textContent = fmt2(minV);
  document.getElementById("max").textContent = fmt2(maxV);

  drawChart(labels, data);
}

/* ===================== WEATHER (Foreca-like 6h blocks) ===================== */
let weatherForecaChart;

const WEATHER_REFRESH_MS = 30 * 60 * 1000; // 30 minutes
const LAT = 59.437;     // Tallinn
const LON = 24.7536;

function wfmt1(n){ return (Number.isFinite(n) ? Number(n).toFixed(1) : "—"); }

/* simple icon mapping from Open-Meteo weather_code */
function iconForCode(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "•";
  if (c === 0) return "☀️";
  if (c === 1) return "🌤️";
  if (c === 2) return "⛅";
  if (c === 3) return "☁️";
  if (c === 45 || c === 48) return "🌫️";
  if (c >= 51 && c <= 57) return "🌦️";
  if (c >= 61 && c <= 67) return "🌧️";
  if (c >= 71 && c <= 77) return "❄️";
  if (c >= 80 && c <= 82) return "🌧️";
  if (c >= 85 && c <= 86) return "❄️";
  if (c >= 95 && c <= 99) return "⛈️";
  return "•";
}

function build6hBlocks(timesISO, temp, precip, wind, wcode){
  // Build blocks at 00/06/12/18 local, across 7 days.
  // Value at the exact block time for temp/wind/wcode.
  // Precip: sum of previous+future 3 hours => offsets -3,-2,-1,0,1,2 (6 hours total).
  const timeIndex = new Map();
  for (let i = 0; i < timesISO.length; i++) timeIndex.set(String(timesISO[i]), i);

  // Find first local midnight in the hourly list
  const dates = timesISO.map(s => new Date(s));
  let firstMidnight = -1;
  for (let i = 0; i < dates.length; i++){
    const d = dates[i];
    if (d.getHours() === 0) { firstMidnight = i; break; }
  }
  if (firstMidnight < 0) firstMidnight = 0;

  const out = {
    labels: [],
    temps: [],
    precip6h: [],
    winds: [],
    icons: [],
    times: []
  };

  // iterate 7 days * 4 blocks
  const blocksPerDay = [0, 6, 12, 18];
  let dayCount = 0;
  let i = firstMidnight;

  // ensure we start exactly at a 00:00 hour
  // if firstMidnight isn't day boundary, normalize by moving to next 00:00
  while (i < dates.length && dates[i].getHours() !== 0) i++;

  while (i < dates.length && dayCount < 7){
    const base = dates[i]; // midnight for the day
    // If we somehow jumped past midnight, break
    if (base.getHours() !== 0) break;

    for (const h of blocksPerDay){
      const dt = new Date(base);
      dt.setHours(h, 0, 0, 0);

      // find matching hour in array by ISO string exact
      const iso = dt.toISOString().slice(0,13); // "YYYY-MM-DDTHH"
      // find first time entry that matches this hour
      let idx = -1;
      for (let k = 0; k < timesISO.length; k++){
        const s = String(timesISO[k]);
        if (s.slice(0,13) === iso) { idx = k; break; }
      }
      if (idx < 0) continue;

      const d = new Date(timesISO[idx]);
      const hourStr = String(d.getHours()).padStart(2,"0");

      // label: show day on first block (00) only, like Foreca row above
      let dayLine = "";
      if (h === 0){
        const weekday = d.toLocaleDateString("en-GB", { weekday: "short" }); // Tue
        const m = d.getMonth() + 1;
        const dd = d.getDate();
        dayLine = `${weekday} ${m}/${dd}`;
      }
      out.labels.push([dayLine, hourStr]); // 2-line ticks
      out.times.push(timesISO[idx]);

      const tV = Number(temp[idx]);
      const wV = Number(wind[idx]);
      const cV = Number(wcode[idx]);

      out.temps.push(Number.isFinite(tV) ? tV : null);
      out.winds.push(Number.isFinite(wV) ? wV : null);
      out.icons.push(iconForCode(cV));

      // 6h precip centered: offsets -3,-2,-1,0,1,2
      let sum = 0;
      let any = false;
      for (const off of [-3,-2,-1,0,1,2]){
        const j = idx + off;
        const p = Number(precip[j]);
        if (j >= 0 && j < precip.length && Number.isFinite(p)){
          sum += p;
          any = true;
        }
      }
      out.precip6h.push(any ? sum : null);
    }

    // move i to next day midnight
    dayCount++;
    const nextDay = new Date(base);
    nextDay.setDate(base.getDate() + 1);
    nextDay.setHours(0,0,0,0);
    const nextIso = nextDay.toISOString().slice(0,13);

    let nextIdx = -1;
    for (let k = 0; k < timesISO.length; k++){
      const s = String(timesISO[k]);
      if (s.slice(0,13) === nextIso) { nextIdx = k; break; }
    }
    if (nextIdx < 0) break;
    i = nextIdx;
  }

  return out;
}

const forecaStyleOverlay = {
  id: "forecaStyleOverlay",
  afterDraw(chart, args, opts){
    const { ctx, chartArea } = chart;
    if (!chartArea) return;

    const icons = opts?.icons || [];
    const winds = opts?.winds || [];
    const xScale = chart.scales?.x;
    if (!xScale) return;

    ctx.save();

    // Icons row (top)
    ctx.font = "16px -apple-system, system-ui, Segoe UI, Roboto, Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (let i = 0; i < chart.data.labels.length; i++){
      const x = xScale.getPixelForTick(i);
      const icon = icons[i] ?? "•";
      ctx.fillText(icon, x, chartArea.top - 10);
    }

    // Wind row (bottom)
    ctx.font = "12px -apple-system, system-ui, Segoe UI, Roboto, Arial";
    ctx.textBaseline = "middle";
    for (let i = 0; i < chart.data.labels.length; i++){
      const x = xScale.getPixelForTick(i);
      const w = winds[i];
      const txt = Number.isFinite(w) ? String(Math.round(w)) : "—";
      ctx.fillStyle = "#2a9d55"; // green-ish like foreca wind
      ctx.fillText(txt, x, chartArea.bottom + 26);
    }

    // units on left bottom: "m/s"
    ctx.fillStyle = "#2a9d55";
    ctx.textAlign = "left";
    ctx.fillText("m/s", chartArea.left, chartArea.bottom + 26);

    // units on right bottom: "mm"
    ctx.fillStyle = "#2a70ff";
    ctx.textAlign = "right";
    ctx.fillText("mm", chartArea.right, chartArea.bottom + 10);

    // units on left: "°C"
    ctx.fillStyle = "#111";
    ctx.textAlign = "left";
    ctx.fillText("°C", chartArea.left, chartArea.bottom + 10);

    ctx.restore();
  }
};

function drawWeatherForecaLike(labels, temps, precip6h, winds, icons){
  const canvas = document.getElementById("weatherForecaChart");
  if (!canvas) return;

  if (weatherForecaChart) weatherForecaChart.destroy();

  weatherForecaChart = new Chart(canvas, {
    data: {
      labels,
      datasets: [
        // Precip bars (right axis)
        {
          type: "bar",
          label: "Sademed (6h, mm)",
          yAxisID: "yP",
          data: precip6h,
          backgroundColor: "rgba(60,130,255,0.55)",
          borderWidth: 0,
          barPercentage: 0.9,
          categoryPercentage: 0.95
        },
        // Temp line (left axis) with segment coloring
        {
          type: "line",
          label: "Temp (°C)",
          yAxisID: "yT",
          data: temps,
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2,
          // segment color: red above 0, blue below 0 (like Foreca)
          segment: {
            borderColor: (ctx) => {
              const y0 = ctx.p0.parsed.y;
              const y1 = ctx.p1.parsed.y;
              // if both below 0 -> blue, else red (simple rule)
              return (y0 < 0 && y1 < 0) ? "#1f77ff" : "#d92626";
            }
          }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        forecaStyleOverlay: { icons, winds }
      },
      layout: {
        // extra room for icons (top) + wind row (bottom)
        padding: { top: 26, bottom: 38, left: 6, right: 6 }
      },
      scales: {
        x: {
          ticks: {
            color: "#111",
            maxRotation: 0,
            minRotation: 0,
            autoSkip: false,
            font: { size: 11 }
          },
          grid: {
            color: "rgba(0,0,0,0.08)",
            lineWidth: 1
          }
        },
        yT: {
          position: "left",
          ticks: { color: "#111" },
          grid: { color: "rgba(0,0,0,0.10)" }
        },
        yP: {
          position: "right",
          ticks: { color: "#2a70ff" },
          grid: { drawOnChartArea: false }
        }
      }
    },
    plugins: [forecaStyleOverlay]
  });
}

async function loadWeather(){
  const errEl = document.getElementById("w_error");
  if (errEl) errEl.textContent = "";

  // Open-Meteo hourly; 7 days; local timezone
  const url =
    "https://api.open-meteo.com/v1/forecast" +
    `?latitude=${LAT}&longitude=${LON}` +
    "&current=temperature_2m,wind_speed_10m" +
    "&hourly=temperature_2m,precipitation,wind_speed_10m,weather_code" +
    "&timezone=Europe%2FTallinn" +
    "&forecast_days=7" +
    "&t=" + Date.now();

  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("Weather HTTP " + r.status);
  const j = await r.json();

  const now = new Date();
  document.getElementById("w_now").textContent  = wfmt1(j?.current?.temperature_2m);
  document.getElementById("w_wind").textContent = wfmt1(j?.current?.wind_speed_10m);

  const hTime = j?.hourly?.time || [];
  const hTemp = j?.hourly?.temperature_2m || [];
  const hPrec = j?.hourly?.precipitation || [];
  const hWind = j?.hourly?.wind_speed_10m || [];
  const hCode = j?.hourly?.weather_code || [];

  // 1h precip + next hour temp (best effort)
  const isoLocalHour = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours())
    .toISOString().slice(0,13);
  let hIdx = hTime.findIndex(t => String(t).slice(0,13) === isoLocalHour);
  if (hIdx < 0) hIdx = 0;

  document.getElementById("w_precip").textContent = wfmt1(Number(hPrec[hIdx]));
  document.getElementById("w_next").textContent   = wfmt1(Number(hTemp[hIdx + 1]));

  document.getElementById("w_updated").textContent =
    `• uuendatud (fetch) ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  const blocks = build6hBlocks(hTime, hTemp, hPrec, hWind, hCode);
  drawWeatherForecaLike(blocks.labels, blocks.temps, blocks.precip6h, blocks.winds, blocks.icons);
}

/* ===================== SCREEN ROTATION ===================== */
const ROTATE_MS = 0.25 * 60 * 1000; // 5 minutes
let showing = 0; // 0=electricity, 1=weather

function showScreen(i){
  const elElec = document.getElementById("screen-electricity");
  const elWea  = document.getElementById("screen-weather");
  if (!elElec || !elWea) return;

  const showElec = (i === 0);
  elElec.style.display = showElec ? "" : "none";
  elWea.style.display  = showElec ? "none" : "";

  if (showElec && chart) chart.resize();
  if (!showElec && weatherForecaChart) weatherForecaChart.resize();
}

/* ===================== BOOT ===================== */
(async ()=>{
  try { await loadData(); }
  catch(e){ document.getElementById("error").textContent = "Viga: " + (e?.message ?? e); }
})();

setInterval(async ()=>{
  try { await loadData(); }
  catch(e){ document.getElementById("error").textContent = "Viga: " + (e?.message ?? e); }
}, REFRESH_MS);

setInterval(()=>{
  try { recomputeCurrentIndexAndRestyle(); } catch {}
}, HIGHLIGHT_MS);

// weather boot + refresh
loadWeather().catch(e=>{
  const errEl = document.getElementById("w_error");
  if (errEl) errEl.textContent = "Viga: " + (e?.message ?? e);
});
setInterval(()=>{
  loadWeather().catch(e=>{
    const errEl = document.getElementById("w_error");
    if (errEl) errEl.textContent = "Viga: " + (e?.message ?? e);
  });
}, WEATHER_REFRESH_MS);

// rotation
showScreen(showing);
setInterval(()=>{
  showing = 1 - showing;
  showScreen(showing);
}, ROTATE_MS);
</script>
