<script>
/* ===================== ELECTRICITY ===================== */
const SRC = "https://cold-shape-2620.mihkel-pranstibel.workers.dev/";

let chart;
let currentBarIndex = -1;

let latest = { labels: [], data: [], tsList: [] };

// fetch JSON every 30 minutes
const REFRESH_MS = 30 * 60 * 1000;
const HIGHLIGHT_MS = 15 * 1000;

document.getElementById("refresh_s").textContent = String(Math.round(REFRESH_MS / 1000));

function fmt2(n){ return (Number.isFinite(n) ? n.toFixed(2) : "—"); }

function sameLocalHour(tsSeconds, nowDate){
  const d = new Date(tsSeconds * 1000);
  return (
    d.getFullYear() === nowDate.getFullYear() &&
    d.getMonth() === nowDate.getMonth() &&
    d.getDate() === nowDate.getDate() &&
    d.getHours() === nowDate.getHours()
  );
}

function colorForValue(v){
  if (!Number.isFinite(v)) return "rgba(120,120,120,0.6)";
  if (v > 18) return "rgba(255, 90, 90, 0.85)";
  if (v < 11) return "rgba(120, 255, 160, 0.85)";
  return "rgba(255, 180, 80, 0.85)";
}

function toHourlyAverages(timeline){
  const map = new Map();
  for (const t of timeline){
    const ts = Number(t.startTimestamp ?? t.timestamp);
    const price = Number(t.price ?? t.value);
    if (!Number.isFinite(ts) || !Number.isFinite(price)) continue;

    const d = new Date(ts * 1000);
    const key =
      d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0") + " " +
      String(d.getHours()).padStart(2,"0");

    const cur = map.get(key) ?? { sum: 0, count: 0, ts: ts };
    cur.sum += price;
    cur.count += 1;
    if (ts < cur.ts) cur.ts = ts;
    map.set(key, cur);
  }

  const rows = [...map.entries()]
    .map(([key, v]) => ({ ts: v.ts, avg: v.sum / v.count }))
    .sort((a,b) => a.ts - b.ts);

  const labels = rows.map(r => {
    const d = new Date(r.ts * 1000);
    return String(d.getHours()).padStart(2,"0") + ":00";
  });

  return { labels, data: rows.map(r => r.avg), tsList: rows.map(r => r.ts) };
}

const glowCurrentBarPlugin = {
  id: 'glowCurrentBar',
  beforeDatasetsDraw(chart) {
    const idx = currentBarIndex;
    if (idx < 0) return;

    const meta = chart.getDatasetMeta(0);
    const el = meta?.data?.[idx];
    if (!el) return;

    const ctx = chart.ctx;
    const area = chart.chartArea;
    if (!area) return;

    const props = el.getProps(['x','width'], true);
    const x = props.x;
    const w = props.width;

    const padX = Math.max(8, w * 0.35);
    const left = x - (w / 2) - padX;
    const width = w + padX * 2;

    ctx.save();
    ctx.shadowColor = 'rgba(255,255,255,0.65)';
    ctx.shadowBlur = 22;
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.fillRect(left, area.top, width, area.bottom - area.top);

    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect(left + 1, area.top + 1, width - 2, (area.bottom - area.top) - 2);
    ctx.restore();
  }
};

function recomputeCurrentIndexAndRestyle(){
  if (!chart || !latest.tsList.length) return;

  const now = new Date();
  const newIdx = latest.tsList.findIndex(ts => sameLocalHour(ts, now));
  if (newIdx === currentBarIndex) return;

  currentBarIndex = newIdx;

  const ds = chart.data.datasets[0];
  ds.backgroundColor = latest.data.map((v, i) => {
    const c = colorForValue(v);
    if (i === currentBarIndex) return c.replace(/0\.85\)$/, "0.98)");
    return c;
  });
  ds.borderWidth = (ctx) => (ctx.dataIndex === currentBarIndex ? 2 : 0);
  ds.borderColor = (ctx) => (ctx.dataIndex === currentBarIndex ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0)");

  chart.update("none");
}

function drawChart(labels, data) {
  const ctx = document.getElementById("priceChart");
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map((v, i) => {
          const c = colorForValue(v);
          if (i === currentBarIndex) return c.replace(/0\.85\)$/, "0.98)");
          return c;
        }),
        borderWidth: (ctx) => (ctx.dataIndex === currentBarIndex ? 2 : 0),
        borderColor: (ctx) => (ctx.dataIndex === currentBarIndex ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0)")
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { autoSkip: true, maxTicksLimit: 24, minRotation: 90, maxRotation: 90 },
          grid: { display: true, color: 'rgba(255,255,255,0.1)', lineWidth: 1 }
        },
        y: {
          beginAtZero: true,
          ticks: { stepSize: 5 },
          grid: { display: true, color: 'rgba(255,255,255,0.2)', lineWidth: 1 },
          title: { display: true, text: "senti/kWh" }
        }
      }
    },
    plugins: [glowCurrentBarPlugin]
  });
}

async function loadData() {
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";

  const url = SRC + (SRC.includes("?") ? "&" : "?") + "t=" + Date.now();
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();

  if (j.chartTitle) document.getElementById("title").textContent = j.chartTitle;

  const now = new Date();
  document.getElementById("updated").textContent =
    `• uuendatud (fetch) ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  const timeline = Array.isArray(j.timeline) ? j.timeline : [];
  const { labels, data, tsList } = toHourlyAverages(timeline);
  if (!labels.length || !data.length) throw new Error("Graafiku andmeid ei leitud (timeline tühi või väljad ei klapi).");

  latest = { labels, data, tsList };

  const nowDate = new Date();
  currentBarIndex = tsList.findIndex(ts => sameLocalHour(ts, nowDate));

  const todayY = nowDate.getFullYear();
  const todayM = nowDate.getMonth();
  const todayD = nowDate.getDate();

  const todayIdx = [];
  for (let i = 0; i < tsList.length; i++) {
    const d = new Date(tsList[i] * 1000);
    if (d.getFullYear() === todayY && d.getMonth() === todayM && d.getDate() === todayD) todayIdx.push(i);
  }
  const idxToUse = todayIdx.length ? todayIdx : tsList.map((_, i) => i);
  const valsToday = idxToUse.map(i => data[i]).filter(Number.isFinite);

  const minV = Math.min(...valsToday);
  const maxV = Math.max(...valsToday);
  const avgV = valsToday.reduce((a,b)=>a+b,0) / (valsToday.length || 1);

  let curIdx = currentBarIndex;
  if (curIdx < 0) curIdx = idxToUse[idxToUse.length - 1];
  const curV = Number.isFinite(data[curIdx]) ? data[curIdx] : NaN;

  document.getElementById("current").textContent = fmt2(curV);
  document.getElementById("avg").textContent = fmt2(avgV);
  document.getElementById("min").textContent = fmt2(minV);
  document.getElementById("max").textContent = fmt2(maxV);

  drawChart(labels, data);
}

/* ===================== WEATHER (Foreca-like, FIXED: 3h temp + exact 0°C crossing) ===================== */
let weatherForecaChart;

const WEATHER_REFRESH_MS = 30 * 60 * 1000;
const LAT = 59.437;
const LON = 24.7536;

function wfmt1(n){ return (Number.isFinite(n) ? Number(n).toFixed(1) : "—"); }
function pad2(n){ return String(n).padStart(2,"0"); }

function windToMs(v){
  const n = Number(v);
  if (!Number.isFinite(n)) return NaN;
  return (n > 20) ? (n / 3.6) : n;
}

/* simple icon mapping (still emoji for now; we’ll do “single combined icon” later) */
function iconForCode(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "•";
  if (c === 0) return "☀️";
  if (c === 1) return "🌤️";
  if (c === 2) return "⛅";
  if (c === 3) return "☁️";
  if (c === 45 || c === 48) return "🌫️";
  if (c >= 51 && c <= 57) return "🌦️";
  if (c >= 61 && c <= 67) return "🌧️";
  if (c >= 71 && c <= 77) return "❄️";
  if (c >= 80 && c <= 82) return "🌧️";
  if (c >= 85 && c <= 86) return "❄️";
  if (c >= 95 && c <= 99) return "⛈️";
  return "•";
}

function localHourKey(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}`;
}

function nextStep2(x){
  if (!Number.isFinite(x)) return 10;
  return Math.ceil(x / 2) * 2;
}

/**
 * Build:
 * - tempLine: points every 3h (x=hours from start) + inserted 0°C crossing points at fractional x
 * - precipBars: bars at 6h ticks (x=0,6,12,18...) value = sum of ±3h window (6h total)
 * - windMarks/icons/dayMarks at 6h ticks for overlay drawing
 */

  // ---- Sunrise / Sunset helpers (Open-Meteo daily arrays) ----
function ymdLocal(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function buildSunMap(daily){
  // daily.time, daily.sunrise, daily.sunset are ISO strings in requested timezone
  const map = new Map();
  const times = daily?.time || [];
  const rises = daily?.sunrise || [];
  const sets  = daily?.sunset || [];
  for (let i = 0; i < times.length; i++){
    const key = String(times[i]).slice(0,10); // YYYY-MM-DD
    const sr = rises[i] ? new Date(rises[i]) : null;
    const ss = sets[i]  ? new Date(sets[i])  : null;
    map.set(key, { sunrise: sr, sunset: ss });
  }
  return map;
}

function isNightAt(dt, sunMap){
  const key = ymdLocal(dt);
  const rec = sunMap?.get(key);
  if (!rec?.sunrise || !rec?.sunset) {
    // fallback: treat 22-05 as night if sunrise/sunset missing
    const h = dt.getHours();
    return (h < 6 || h >= 22);
  }
  return (dt < rec.sunrise || dt >= rec.sunset);
}

function iconForCodeDay(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "•";
  if (c === 0) return "☀️";
  if (c === 1) return "🌤️";
  if (c === 2) return "⛅";
  if (c === 3) return "☁️";
  if (c === 45 || c === 48) return "🌫️";
  if (c >= 51 && c <= 57) return "🌦️";
  if (c >= 61 && c <= 67) return "🌧️";
  if (c >= 71 && c <= 77) return "❄️";
  if (c >= 80 && c <= 82) return "🌧️";
  if (c >= 85 && c <= 86) return "❄️";
  if (c >= 95 && c <= 99) return "⛈️";
  return "•";
}

function iconForCodeNight(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "•";
  if (c === 0) return "🌙";
  if (c === 1 || c === 2) return "🌙☁️";
  if (c === 3) return "☁️";
  if (c === 45 || c === 48) return "🌫️";
  if ((c >= 51 && c <= 57) || (c >= 61 && c <= 67) || (c >= 80 && c <= 82)) return "🌧️";
  if ((c >= 71 && c <= 77) || (c >= 85 && c <= 86)) return "❄️";
  if (c >= 95 && c <= 99) return "⛈️";
  return "🌙";
}
function buildWeatherSeries(timesISO, temp, precip, wind, wcode){
  const idxByHour = new Map();
  for (let k = 0; k < timesISO.length; k++){
    idxByHour.set(String(timesISO[k]).slice(0,13), k);
  }

  // find first local midnight present in data
  const dates = timesISO.map(s => new Date(s));
  let startIdx = dates.findIndex(d => d.getHours() === 0);
  if (startIdx < 0) startIdx = 0;

  let start = new Date(dates[startIdx]);
  start.setHours(0,0,0,0);

  const HOURS_TOTAL = 7 * 24;

  // --- 3h temperature points
  const raw3h = [];
  for (let h = 0; h <= HOURS_TOTAL; h += 3){
    const dt = new Date(start);
    dt.setHours(dt.getHours() + h);
    const idx = idxByHour.get(localHourKey(dt));
    if (idx == null) continue;
    const tV = Number(temp[idx]);
    if (Number.isFinite(tV)) raw3h.push({ x: h, y: tV });
  }

  // Insert exact 0°C crossing points
  const tempLine = [];
  for (let i = 0; i < raw3h.length; i++){
    const a = raw3h[i];
    tempLine.push(a);
    const b = raw3h[i + 1];
    if (!b) continue;

    if ((a.y > 0 && b.y < 0) || (a.y < 0 && b.y > 0)){
      const t = a.y / (a.y - b.y);     // fraction between a and b where y=0
      const x0 = a.x + (b.x - a.x) * t;
      tempLine.push({ x: x0, y: 0 });
    }
  }

  // --- 6h marks for bars/icons/wind/day labels
  const precipBars = [];
  const windMarks  = [];
  const iconMarks  = [];
  const dayMarks   = [];

  for (let h = 0; h <= HOURS_TOTAL; h += 6){
    const dt = new Date(start);
    dt.setHours(dt.getHours() + h);
    const idx = idxByHour.get(localHourKey(dt));
    if (idx == null) continue;

    const hour = dt.getHours();
    if (hour === 0){
      const weekday = dt.toLocaleDateString("en-GB", { weekday: "short" });
      const m = dt.getMonth() + 1;
      const dd = dt.getDate();
      dayMarks.push({ x: h, text: `${weekday} ${m}/${dd}` });
    }

    // icon (6h)
    const cV = Number(wcode[idx]);
    iconMarks.push({ x: h, dt: new Date(dt), code: cV });

    // wind (6h)
    const wV = Number(wind[idx]);
    windMarks.push({ x: h, y: Number.isFinite(wV) ? wV : null });

    // precip (6h window around idx): offsets -3,-2,-1,0,1,2
    let sum = 0;
    let any = false;
    for (const off of [-3,-2,-1,0,1,2]){
      const j = idx + off;
      if (j >= 0 && j < precip.length){
        const p = Number(precip[j]);
        if (Number.isFinite(p)) { sum += p; any = true; }
      }
    }
    precipBars.push({ x: h, y: any ? sum : null });
  }

  return { start, tempLine, precipBars, windMarks, iconMarks, dayMarks };
}

const forecaStyleOverlay = {
  id: "forecaStyleOverlay",
  afterDraw(chart, args, opts){
    const { ctx, chartArea } = chart;
    if (!chartArea) return;

    const xScale = chart.scales?.x;
    if (!xScale) return;

    const iconMarks = opts?.iconMarks || [];
    const windMarks = opts?.windMarks || [];
    const dayMarks  = opts?.dayMarks || [];

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Day labels (top-most)
    ctx.font = "12px -apple-system, system-ui, Segoe UI, Roboto, Arial";
    ctx.fillStyle = "#111";
    for (const m of dayMarks){
      const x = xScale.getPixelForValue(m.x);
      ctx.fillText(m.text, x, chartArea.top - 58);
    }

// Icons row (below hour ticks) — emoji icons
const sunMap = opts?.sunMap;

ctx.font = "16px -apple-system, system-ui, Segoe UI, Roboto, Arial";
ctx.fillStyle = "#111";

for (const m of iconMarks){
  const px = xScale.getPixelForValue(m.x);
  const py = chartArea.top - 10;

  const night = isNightAt(m.dt, sunMap);
  const icon = night ? iconForCodeNight(m.code) : iconForCodeDay(m.code);

  ctx.fillText(icon, px, py);
}
    // Wind row (bottom) - BLACK
    ctx.font = "12px -apple-system, system-ui, Segoe UI, Roboto, Arial";
    ctx.fillStyle = "#111";
    for (const m of windMarks){
      const x = xScale.getPixelForValue(m.x);
      const txt = Number.isFinite(m.y) ? String(Math.round(m.y)) : "—";
      ctx.fillText(txt, x, chartArea.bottom + 30);
    }

    // units
    ctx.textAlign = "left";
    ctx.fillStyle = "#111";
    ctx.fillText("m/s", chartArea.left - 20, chartArea.bottom + 30);

    ctx.fillStyle = "#2a70ff";
    ctx.textAlign = "right";
    ctx.fillText("mm", chartArea.right, chartArea.bottom + 12);

    ctx.fillStyle = "#111";
    ctx.textAlign = "left";
    ctx.fillText("°C", chartArea.left, chartArea.bottom + 12);

    ctx.restore();
  }
};

const zeroCLinePlugin = {
  id: "zeroCLine",
  afterDraw(chart){
    const yT = chart.scales?.yT;
    const area = chart.chartArea;
    if (!yT || !area) return;

    const y0 = yT.getPixelForValue(0);
    if (!Number.isFinite(y0)) return;
    if (y0 < area.top || y0 > area.bottom) return;

    const ctx = chart.ctx;
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(area.left, y0);
    ctx.lineTo(area.right, y0);
    ctx.stroke();
    ctx.restore();
  }
};

function drawWeatherForecaLike(series){
  const canvas = document.getElementById("weatherForecaChart");
  if (!canvas) return;

  // hard cleanup in case anything crashed earlier
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  if (weatherForecaChart) { try { weatherForecaChart.destroy(); } catch {} }
  weatherForecaChart = null;

  const { tempLine, precipBars, windMarks, iconMarks, dayMarks } = series;

  const maxP = Math.max(0, ...precipBars.map(p => p.y).filter(v => Number.isFinite(v)));
  const pMax = maxP > 10 ? nextStep2(maxP) : 10;

  weatherForecaChart = new Chart(canvas, {
    data: {
      datasets: [
        // precip bars at 6h ticks
        {
          type: "bar",
          yAxisID: "yP",
          data: precipBars.filter(p => Number.isFinite(p.y)),
          parsing: false,
          backgroundColor: "rgba(60,130,255,0.55)",
          borderWidth: 0,
          barThickness: 22
        },
        // temperature line: single dataset, colored by segment
        {
          type: "line",
          yAxisID: "yT",
          data: tempLine,
          parsing: false,
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2,
          spanGaps: true,
          segment: {
            borderColor: (ctx) => {
              const y0 = ctx.p0.parsed.y;
              const y1 = ctx.p1.parsed.y;
              const mid = (y0 + y1) / 2;
              return (mid < 0) ? "#1f77ff" : "#d92626";
            }
          }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
  legend: { display: false },
  forecaStyleOverlay: { windMarks, iconMarks, dayMarks, sunMap: series.sunMap }
},
      layout: { padding: { top: 78, bottom: 54, left: 10, right: 10 } },
      scales: {
        x: {
          type: "linear",
          position: "top",
          min: 0,
          max: 7 * 24,
          ticks: {
            color: "#111",
            stepSize: 6,
            padding: 26,
            callback: (v) => pad2(((v % 24) + 24) % 24)
          },
          grid: {
            lineWidth: (c) => {
              const v = (c && c.tick && typeof c.tick.value === "number") ? c.tick.value
                      : (c && typeof c.value === "number") ? c.value
                      : 0;
              return (v % 24 === 0) ? 2 : 1;
            },
            color: (c) => {
              const v = (c && c.tick && typeof c.tick.value === "number") ? c.tick.value
                      : (c && typeof c.value === "number") ? c.value
                      : 0;
              return (v % 24 === 0) ? "rgba(0,0,0,0.35)" : "rgba(0,0,0,0.08)";
            }
          }
        },
        yT: {
          position: "left",
          ticks: { color: "#111" },
          grid: { color: "rgba(0,0,0,0.10)" }
        },
        yP: {
          position: "right",
          min: 0,
          suggestedMax: pMax,
          ticks: { color: "#2a70ff", stepSize: 2 },
          grid: { drawOnChartArea: false }
        }
      }
    },
    plugins: [forecaStyleOverlay, zeroCLinePlugin]
  });
}

async function loadWeather(){
  const errEl = document.getElementById("w_error");
  if (errEl) errEl.textContent = "";

  try {
    const url =
      "https://api.open-meteo.com/v1/forecast" +
      `?latitude=${LAT}&longitude=${LON}` +
      "&current=temperature_2m,wind_speed_10m" +
      "&hourly=temperature_2m,precipitation,wind_speed_10m,weather_code" +
      "&daily=sunrise,sunset" +
      "&wind_speed_unit=ms" +
      "&timezone=Europe%2FTallinn" +
      "&forecast_days=7" +
      "&t=" + Date.now();

    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error("Weather HTTP " + r.status);
    const j = await r.json();
    const sunMap = buildSunMap(j?.daily);


    const now = new Date();

    const hTime = j?.hourly?.time || [];
    const hTemp = j?.hourly?.temperature_2m || [];
    const hPrec = j?.hourly?.precipitation || [];
    const hWind = j?.hourly?.wind_speed_10m || [];
    const hCode = j?.hourly?.weather_code || [];

    document.getElementById("w_now").textContent  = wfmt1(j?.current?.temperature_2m);
    document.getElementById("w_wind").textContent = wfmt1(windToMs(j?.current?.wind_speed_10m));

    // current hour index by local key
    const keyNow = localHourKey(now);
    let hIdx = hTime.findIndex(t => String(t).slice(0,13) === keyNow);
    if (hIdx < 0) hIdx = 0;

    document.getElementById("w_precip").textContent = wfmt1(Number(hPrec[hIdx]));
    document.getElementById("w_next").textContent   = wfmt1(Number(hTemp[hIdx + 1]));

    document.getElementById("w_updated").textContent =
      `• uuendatud (fetch) ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;

    const hWindMs = (hWind || []).map(windToMs);

    const series = buildWeatherSeries(hTime, hTemp, hPrec, hWindMs, hCode);

// attach sunrise/sunset info
series.sunMap = sunMap;

drawWeatherForecaLike(series);

  } catch(e){
    if (errEl) errEl.textContent = "Viga: " + (e?.message ?? e);
    throw e;
  }
}

/* ===================== SCREEN ROTATION ===================== */
const ROTATE_MS = 0.25 * 60 * 1000; // 15 seconds (0.25 min) as you said intentional
let showing = 0; // 0=electricity, 1=weather

function showScreen(i){
  const elElec = document.getElementById("screen-electricity");
  const elWea  = document.getElementById("screen-weather");
  if (!elElec || !elWea) return;

  const showElec = (i === 0);
  elElec.style.display = showElec ? "" : "none";
  elWea.style.display  = showElec ? "none" : "";

  if (showElec && chart) chart.resize();
  if (!showElec && weatherForecaChart) weatherForecaChart.resize();
}

/* ===================== BOOT ===================== */
(async ()=>{
  try { await loadData(); }
  catch(e){ document.getElementById("error").textContent = "Viga: " + (e?.message ?? e); }
})();

setInterval(async ()=>{
  try { await loadData(); }
  catch(e){ document.getElementById("error").textContent = "Viga: " + (e?.message ?? e); }
}, REFRESH_MS);

setInterval(()=>{
  try { recomputeCurrentIndexAndRestyle(); } catch {}
}, HIGHLIGHT_MS);

// weather boot + refresh
loadWeather().catch(e=>{
  const errEl = document.getElementById("w_error");
  if (errEl) errEl.textContent = "Viga: " + (e?.message ?? e);
});
setInterval(()=>{
  loadWeather().catch(e=>{
    const errEl = document.getElementById("w_error");
    if (errEl) errEl.textContent = "Viga: " + (e?.message ?? e);
  });
}, WEATHER_REFRESH_MS);

// rotation
showScreen(showing);
setInterval(()=>{
  showing = 1 - showing;
  showScreen(showing);
}, ROTATE_MS);
